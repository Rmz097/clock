<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calendario</title>
    <link rel="stylesheet" href="./css/calendario.css">
    <link rel="icon" href="./img/icon.ico" />
</head>
<body class="theme-dark"> <div class="app-wrapper">
    <div class="calendar-container">
        <header class="calendar-header" onclick="openModal()">
            <div class="side-info">Tacrascendidos: <span id="transc-days">---</span></div>
            <div class="main-title">
                <h1 id="month-display">----</h1>
                <h2 id="year-display">----</h2>
            </div>
            <div class="side-info">Faltan: <span id="remain-days">---</span></div>
        </header>

        <table class="calendar-table">
            <thead>
                <tr class="days-header">
                    <th class="is-sunday">DOM</th> 
                    <th>LUN</th>
                    <th>MAR</th>
                    <th>MIÉ</th>
                    <th>JUE</th>
                    <th>VIE</th>
                    <th>SÁB</th>
                </tr>
            </thead>
            <tbody id="calendar-body"></tbody>
        </table>
        
        <footer class="calendar-footer">
            <a href="./index.html" class="btn-back">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
                <span>Volver</span>
            </a>
        </footer>
    </div>
</div>

<div id="calendar-modal" class="modal">
    <div class="modal-content">
        <h3>Seleccionar Fecha</h3>
        <label>Mes:</label>
        <select id="modal-month-select"></select>
        <label>Año:</label>
        <input type="number" id="modal-year-input">
        
        <div class="modal-footer">
            <button onclick="closeModal()" class="btn-primary">Cerrar</button>
            <button class="btn-primary" onclick="applyDateChange()">Aplicar</button>
        </div>
    </div>
</div>

<script src="./js/script.js"></script>
</body>
</html>
